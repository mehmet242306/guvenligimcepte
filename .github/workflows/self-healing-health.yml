name: Self-Healing Health

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

jobs:
  run-health:
    runs-on: ubuntu-latest
    env:
      APP_BASE_URL: ${{ secrets.APP_BASE_URL }}
      SELF_HEALING_CRON_SECRET: ${{ secrets.SELF_HEALING_CRON_SECRET }}
      VERCEL_PROTECTION_BYPASS_SECRET: ${{ secrets.VERCEL_PROTECTION_BYPASS_SECRET }}
    steps:
      - name: Run self-healing health checks
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${APP_BASE_URL:-}" ] || [ -z "${SELF_HEALING_CRON_SECRET:-}" ]; then
            echo "::notice title=Self-healing health skipped::APP_BASE_URL veya SELF_HEALING_CRON_SECRET tanimli degil."
            exit 0
          fi
          bypass=()
          if [ -n "${VERCEL_PROTECTION_BYPASS_SECRET:-}" ]; then
            bypass+=(-H "x-vercel-protection-bypass: ${VERCEL_PROTECTION_BYPASS_SECRET}")
          fi
          # Cold-start tolerance: ilk istek 10s+ Vercel timeout'una takılırsa
          # 15s sonra warm fonksiyon ile tekrar dene.
          if ! response="$(curl -fsS --retry 2 --retry-delay 15 --retry-all-errors --max-time 60 \
            -X POST "${APP_BASE_URL%/}/api/health" \
            -H "Content-Type: application/json" \
            -H "x-self-healing-key: ${SELF_HEALING_CRON_SECRET}" \
            "${bypass[@]}" \
            --data '{}')"; then
            echo "::error::curl basarisiz (genelde HTTP 401). VERCEL_PROTECTION_BYPASS_SECRET veya SELF_HEALING_CRON_SECRET eslesmesini kontrol edin."
            exit 1
          fi
          echo "$response"
          printf '%s' "$response" | python3 -c "import json,sys; payload=json.load(sys.stdin); print(f\"overall={payload.get('overallStatus', payload.get('status'))}\")"
