name: Deployment Smoke

on:
  workflow_dispatch:

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    env:
      APP_BASE_URL: ${{ secrets.APP_BASE_URL }}
      SELF_HEALING_CRON_SECRET: ${{ secrets.SELF_HEALING_CRON_SECRET }}
    steps:
      - name: Validate required secrets
        shell: bash
        run: |
          set -euo pipefail
          test -n "$APP_BASE_URL" || { echo "::error::Missing APP_BASE_URL"; exit 1; }
          test -n "$SELF_HEALING_CRON_SECRET" || { echo "::error::Missing SELF_HEALING_CRON_SECRET"; exit 1; }

      - name: Run smoke checks and record deployment log
        shell: bash
        run: |
          set -euo pipefail
          BUILD_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          SMOKE_COMPLETED="0"
          log_status() {
            local status="$1"
            local smoke_status="$2"
            local details="$3"
            curl -fsS -X POST "${APP_BASE_URL%/}/api/self-healing/deployments/log" \
              -H "Content-Type: application/json" \
              -H "x-self-healing-key: ${SELF_HEALING_CRON_SECRET}" \
              --data "{\"environment\":\"production\",\"source\":\"github_actions\",\"status\":\"${status}\",\"smokeTestStatus\":\"${smoke_status}\",\"commitSha\":\"${GITHUB_SHA}\",\"branch\":\"${GITHUB_REF_NAME}\",\"buildUrl\":\"${BUILD_URL}\",\"initiatedBy\":\"github_actions\",\"details\":{\"summary\":\"${details}\"}}"
          }
          on_error() {
            if [ "$SMOKE_COMPLETED" != "1" ]; then
              log_status "failed" "failed" "Smoke suite failed"
            fi
          }
          trap on_error ERR

          log_status "started" "pending" "Smoke suite started"

          if ! health_response="$(curl -fsS "${APP_BASE_URL%/}/api/health")"; then
            log_status "failed" "failed" "Health endpoint request failed"
            exit 1
          fi

          printf '%s' "$health_response" | python3 -c "import json,sys; payload=json.load(sys.stdin); status=payload.get('status'); assert status in ('healthy','degraded'), f'Unexpected health status: {status}'"

          curl -fsS "${APP_BASE_URL%/}/" > /dev/null
          curl -fsS "${APP_BASE_URL%/}/login" > /dev/null

          log_status "success" "success" "Smoke suite completed"
          SMOKE_COMPLETED="1"
