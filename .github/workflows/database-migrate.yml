name: Database Migrate

on:
  workflow_dispatch:

jobs:
  migrate-db:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
      SUPABASE_POOLER_HOST: ${{ secrets.SUPABASE_POOLER_HOST }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Validate required secrets
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "${SUPABASE_DB_URL:-}" ]; then
            exit 0
          fi
          test -n "$SUPABASE_PROJECT_REF" || { echo "::error::Missing SUPABASE_PROJECT_REF"; exit 1; }
          test -n "$SUPABASE_DB_PASSWORD" || { echo "::error::Missing SUPABASE_DB_PASSWORD"; exit 1; }

      - name: Build database connection
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "${SUPABASE_DB_URL:-}" ]; then
            echo "::add-mask::$SUPABASE_DB_URL"
            echo "WORKFLOW_PSQL_CONN=${SUPABASE_DB_URL}" >> "$GITHUB_ENV"
          else
            POOLER_HOST="${SUPABASE_POOLER_HOST:-aws-1-eu-west-1.pooler.supabase.com}"
            POOLER_USER="postgres.${SUPABASE_PROJECT_REF}"
            DB_PASSWORD_ENCODED="$(python3 -c 'import os, urllib.parse; print(urllib.parse.quote(os.environ["SUPABASE_DB_PASSWORD"], safe=""))')"
            WORKFLOW_URI="postgresql://${POOLER_USER}:${DB_PASSWORD_ENCODED}@${POOLER_HOST}:5432/postgres?sslmode=require"
            echo "::add-mask::$WORKFLOW_URI"
            echo "WORKFLOW_PSQL_CONN=${WORKFLOW_URI}" >> "$GITHUB_ENV"
          fi

      - name: Show sanitized connection target
        shell: bash
        run: |
          set -euo pipefail
          python3 -c 'import os; from urllib.parse import urlsplit; p=urlsplit(os.environ["WORKFLOW_PSQL_CONN"]); print(f"DB host: {p.hostname}"); print(f"DB user: {p.username}")'

      - name: Apply remote migrations
        shell: bash
        run: |
          set -euxo pipefail
          npx --yes supabase@latest db push --db-url "$WORKFLOW_PSQL_CONN" --include-all --yes
