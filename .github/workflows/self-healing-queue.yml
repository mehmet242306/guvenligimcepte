name: Self-Healing Queue

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

jobs:
  process-queue:
    runs-on: ubuntu-latest
    env:
      APP_BASE_URL: ${{ secrets.APP_BASE_URL }}
      SELF_HEALING_CRON_SECRET: ${{ secrets.SELF_HEALING_CRON_SECRET }}
    steps:
      - name: Validate required secrets
        shell: bash
        run: |
          set -euo pipefail
          test -n "$APP_BASE_URL" || { echo "::error::Missing APP_BASE_URL"; exit 1; }
          test -n "$SELF_HEALING_CRON_SECRET" || { echo "::error::Missing SELF_HEALING_CRON_SECRET"; exit 1; }

      - name: Process queued tasks
        shell: bash
        run: |
          set -euo pipefail
          curl -fsS -X POST "${APP_BASE_URL%/}/api/self-healing/queue/process" \
            -H "Content-Type: application/json" \
            -H "x-self-healing-key: ${SELF_HEALING_CRON_SECRET}" \
            --data '{"batchSize":10}'
