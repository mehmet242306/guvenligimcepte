name: Self-Healing Backup

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * 1"

jobs:
  run-backup:
    runs-on: ubuntu-latest
    env:
      APP_BASE_URL: ${{ secrets.APP_BASE_URL }}
      SELF_HEALING_CRON_SECRET: ${{ secrets.SELF_HEALING_CRON_SECRET }}
    steps:
      - name: Run scheduled backup
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${APP_BASE_URL:-}" ] || [ -z "${SELF_HEALING_CRON_SECRET:-}" ]; then
            echo "::notice title=Self-healing backup skipped::APP_BASE_URL veya SELF_HEALING_CRON_SECRET tanimli degil."
            exit 0
          fi
          # Backup işi DB tablo sayısına göre uzun sürebilir; --max-time 180.
          curl -fsS --retry 2 --retry-delay 30 --retry-all-errors --max-time 180 \
            -X POST "${APP_BASE_URL%/}/api/self-healing/backup/run" \
            -H "Content-Type: application/json" \
            -H "x-self-healing-key: ${SELF_HEALING_CRON_SECRET}" \
            --data '{"backupType":"scheduled_weekly_snapshot"}'
