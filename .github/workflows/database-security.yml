name: Database Security

on:
  workflow_dispatch:
  pull_request:
    branches: ["main", "develop"]
  push:
    branches: ["main", "develop"]

jobs:
  security-db:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
    steps:
      - uses: actions/checkout@v6

      - name: Prepare runner tools
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v psql >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y postgresql-client
          fi

      - name: Validate required secrets
        shell: bash
        run: |
          set -euo pipefail
          test -n "$SUPABASE_PROJECT_REF" || { echo "::error::Missing SUPABASE_PROJECT_REF"; exit 1; }
          test -n "$SUPABASE_DB_PASSWORD" || { echo "::error::Missing SUPABASE_DB_PASSWORD"; exit 1; }

      - name: Show tool versions
        shell: bash
        run: |
          set -euo pipefail
          psql --version

      - name: Verify database connection
        shell: bash
        env:
          PGPASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          set -euxo pipefail
          psql "host=db.$SUPABASE_PROJECT_REF.supabase.co port=5432 dbname=postgres user=postgres sslmode=require" \
            -v ON_ERROR_STOP=1 \
            -c "select current_database(), current_user;" || {
              echo "::error title=Database connection failed::psql could not connect to Supabase"
              exit 1
            }

      - name: Validate migration history
        shell: bash
        env:
          PGPASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          set -euo pipefail
          find supabase/migrations -maxdepth 1 -type f -name '*.sql' -printf '%f\n' | sort > /tmp/local_migrations.txt
          psql "host=db.$SUPABASE_PROJECT_REF.supabase.co port=5432 dbname=postgres user=postgres sslmode=require" \
            -v ON_ERROR_STOP=1 \
            -At -c "select version || '_' || name || '.sql' from supabase_migrations.schema_migrations order by version;" > /tmp/remote_migrations.txt
          missing_count="$(comm -23 /tmp/local_migrations.txt /tmp/remote_migrations.txt | tee /tmp/pending_migrations.txt | wc -l | tr -d ' ')"
          if [ "$missing_count" != "0" ]; then
            echo "::error title=Migration validation failed::Remote database is missing committed migrations"
            echo "Pending migrations:"
            cat /tmp/pending_migrations.txt
            exit 1
          fi

      - name: Run RLS pgTAP suite
        shell: bash
        env:
          PGPASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          set -euxo pipefail
          psql "host=db.${{ secrets.SUPABASE_PROJECT_REF }}.supabase.co port=5432 dbname=postgres user=postgres sslmode=require" \
            -v ON_ERROR_STOP=1 \
            -c "select * from public.rls_tests();" || {
              echo "::error title=RLS test suite failed::public.rls_tests() returned an error"
              exit 1
            }
